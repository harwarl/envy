name: envy

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                rust: [stable, beta, nightly]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install stable toolchain
              uses: actions-rs/toolchain@v1
              with:
                  toolchain: stable
                  override: true

            - name: Test
              run: cargo test --verbose

            - name: Build
              run: cargo build --verbose

    check:
        name: Check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install stable toolchain
              uses: actions-rs/toolchain@v1
              with:
                  toolchain: stable
                  override: true

            - name: Run Cargo Check
              uses: actions-rs/cargo@v1
              with:
                  command: fmt
                  args: -- --check

            - name: Run cargo-tarpaulin
              uses: actions-rs/tarpaulin@v0.1
              with:
                  version: "0.15.0"
                  args: "-- --test-threads 1"
